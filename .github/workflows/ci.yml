name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend ────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          cd hf-desktop/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Syntax check all Python files
        run: |
          cd hf-desktop/backend
          python -m py_compile main.py state.py
          for f in routers/*.py; do python -m py_compile "$f"; done
          echo "All Python files OK"

      - name: Run backend tests
        run: |
          cd hf-desktop/backend
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"

  # ── VS Code extension ─────────────────────────────────────────────────────
  vscode:
    name: VS Code Extension (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hf-vscode/package-lock.json

      - name: Install dependencies
        run: cd hf-vscode && npm ci

      - name: TypeScript compile check
        run: cd hf-vscode && npx tsc -p tsconfig.json --noEmit

      - name: Package extension (dry run)
        run: |
          cd hf-vscode
          npm install -g @vscode/vsce --silent
          vsce package --no-dependencies --allow-missing-repository 2>/dev/null || true
          ls -lh *.vsix 2>/dev/null || echo "Package skipped in CI"

  # ── Desktop frontend ──────────────────────────────────────────────────────
  frontend:
    name: Desktop Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hf-desktop/frontend/package-lock.json

      - name: Install dependencies
        run: cd hf-desktop/frontend && npm ci

      - name: TypeScript compile check
        run: cd hf-desktop/frontend && npx tsc -p tsconfig.json --noEmit

      - name: Vite build check
        run: cd hf-desktop/frontend && npm run build
        env:
          NODE_ENV: production
