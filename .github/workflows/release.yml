name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Build VS Code extension ───────────────────────────────────────────────
  build-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # FIX 1: npm version errors if version already matches. Use jq instead.
      - name: Update version in package.json
        run: |
          cd hf-vscode
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

      - name: Install dependencies
        run: cd hf-vscode && npm ci

      - name: TypeScript compile
        run: cd hf-vscode && npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: |
          cd hf-vscode
          vsce package --no-dependencies
          echo "Packaged: $(ls *.vsix)"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: hf-vscode/*.vsix
          retention-days: 5

  # ── Build desktop app (macOS) ─────────────────────────────────────────────
  build-desktop-mac:
    name: Desktop App (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python backend deps
        run: |
          cd hf-desktop/backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt --quiet

      - name: Install frontend deps and build
        run: |
          cd hf-desktop/frontend
          npm install
          npm run build

      # FIX 2: Run electron-builder directly with --publish never so it doesn't
      # try to auto-publish to GitHub and can't find the electron version.
      - name: Install Electron deps and build
        run: |
          cd hf-desktop
          npm ci
          npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          path: |
            hf-desktop/dist/*.dmg
            hf-desktop/dist/*.zip
          retention-days: 5

  # ── Build desktop app (Windows) ───────────────────────────────────────────
  build-desktop-win:
    name: Desktop App (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python backend deps
        run: |
          cd hf-desktop/backend
          python -m venv .venv
          .venv\Scripts\pip install -r requirements.txt --quiet

      - name: Install frontend deps and build
        run: |
          cd hf-desktop/frontend
          npm install
          npm run build

      - name: Install Electron deps and build
        run: |
          cd hf-desktop
          npm ci
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: hf-desktop/dist/*.exe
          retention-days: 5

  # ── Build desktop app (Linux) ─────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop App (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # FIX 3: Package names changed in Ubuntu 22.04+.
      # libwebkit2gtk-4.0-dev -> libwebkit2gtk-4.1-dev
      # libappindicator3-dev  -> libayatana-appindicator3-dev
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Python backend deps
        run: |
          cd hf-desktop/backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt --quiet

      - name: Install frontend deps and build
        run: |
          cd hf-desktop/frontend
          npm install
          npm run build

      - name: Install Electron deps and build
        run: |
          cd hf-desktop
          npm ci
          npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            hf-desktop/dist/*.AppImage
            hf-desktop/dist/*.deb
          retention-days: 5

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-extension
      - build-desktop-mac
      - build-desktop-win
      - build-desktop-linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List artifacts
        run: find release-artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # FIX 4: Use a shell variable for the heredoc so template expressions
      # inside the notes don't get evaluated by the Actions expression parser.
      - name: Write release notes
        run: |
          VERSION="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VER="${{ steps.version.outputs.version }}"
          cat > release_notes.md << EOF
          ## HF Hub Desktop ${VERSION}

          GUI for Hugging Face Hub — browse, download, and upload models & datasets without writing code.
          Includes a VS Code extension optimised for SSH/cluster workflows.

          ### Install

          #### Desktop App
          | Platform | Download |
          |---|---|
          | macOS | \`.dmg\` file below |
          | Windows | \`.exe\` installer below |
          | Linux | \`.AppImage\` below — chmod +x then run, no install needed |

          #### VS Code Extension
          **From Marketplace:**
          \`\`\`
          ext install DarpanAswal.hf-hub-vscode
          \`\`\`
          **Manual install (for clusters without internet in VS Code):**
          \`\`\`bash
          code --install-extension hf-hub-vscode-${VER}.vsix
          \`\`\`

          ### What's new
          See [CHANGELOG.md](https://github.com/${REPO}/blob/main/CHANGELOG.md) for full details.

          ### Requirements
          - **Desktop app**: macOS 12+, Windows 10+, Ubuntu 20.04+
          - **VS Code extension**: VS Code 1.85+, Python 3.8+ on PATH

          ---
          Not affiliated with Hugging Face, Inc. Uses the [huggingface_hub](https://github.com/huggingface/huggingface_hub) library (Apache 2.0).
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HF Hub Desktop ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-artifacts/vscode-extension/*.vsix
            release-artifacts/desktop-mac/*.dmg
            release-artifacts/desktop-mac/*.zip
            release-artifacts/desktop-win/*.exe
            release-artifacts/desktop-linux/*.AppImage
            release-artifacts/desktop-linux/*.deb

  # ── Publish to VS Code Marketplace ───────────────────────────────────────
  publish-marketplace:
    name: Publish to VS Code Marketplace
    needs: build-extension
    runs-on: ubuntu-latest
    if: |
      !contains(github.ref_name, 'alpha') &&
      !contains(github.ref_name, 'beta') &&
      !contains(github.ref_name, 'rc')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: hf-vscode/

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd hf-vscode
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret not set — skipping Marketplace publish."
            echo "Add it under GitHub repo Settings -> Secrets -> Actions -> VSCE_PAT"
            exit 0
          fi
          vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
