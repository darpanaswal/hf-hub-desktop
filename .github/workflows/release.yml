name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── VS Code extension ────────────────────────────────────────────────────────
  vscode-package:
    name: Package VS Code extension
    runs-on: ubuntu-latest
    outputs:
      vsix_name: ${{ steps.package.outputs.vsix_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: cd hf-vscode && npm ci
      - name: Compile
        run: cd hf-vscode && npx tsc -p tsconfig.json
      - name: Package .vsix
        id: package
        run: |
          cd hf-vscode
          VERSION=${GITHUB_REF_NAME#v}
          npx @vscode/vsce package --no-dependencies -o hf-hub-vscode-${VERSION}.vsix
          echo "vsix_name=hf-hub-vscode-${VERSION}.vsix" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: hf-vscode/*.vsix

  # ── Desktop app — macOS ──────────────────────────────────────────────────────
  desktop-mac:
    name: Desktop app (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install frontend deps
        run: cd hf-desktop/frontend && npm ci
      - name: Build frontend
        run: cd hf-desktop/frontend && npm run build
      - name: Install Electron deps
        run: cd hf-desktop && npm ci
      - name: Setup Python venv
        run: |
          cd hf-desktop/backend
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Build Electron app
        run: cd hf-desktop && npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: hf-desktop/dist/*.dmg

  # ── Desktop app — Linux ──────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop app (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: sudo apt-get install -y libarchive-tools rpm
      - name: Install frontend deps
        run: cd hf-desktop/frontend && npm ci
      - name: Build frontend
        run: cd hf-desktop/frontend && npm run build
      - name: Install Electron deps
        run: cd hf-desktop && npm ci
      - name: Setup Python venv
        run: |
          cd hf-desktop/backend
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Build Electron app
        run: cd hf-desktop && npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: hf-desktop/dist/*.AppImage

  # ── Desktop app — Windows ────────────────────────────────────────────────────
  desktop-win:
    name: Desktop app (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install frontend deps
        run: cd hf-desktop/frontend && npm ci
      - name: Build frontend
        run: cd hf-desktop/frontend && npm run build
      - name: Install Electron deps
        run: cd hf-desktop && npm ci
      - name: Setup Python venv
        run: |
          cd hf-desktop/backend
          python3 -m venv .venv
          .venv/Scripts/pip install -r requirements.txt
      - name: Build Electron app
        run: cd hf-desktop && npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: hf-desktop/dist/*.exe

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [vscode-package, desktop-mac, desktop-linux, desktop-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "HF Hub Desktop v${{ env.VERSION }}"
          body_path: CHANGELOG.md
          files: |
            artifacts/vsix/*.vsix
            artifacts/mac-dmg/*.dmg
            artifacts/linux-appimage/*.AppImage
            artifacts/win-installer/*.exe
          draft: false
          prerelease: false

  # ── Publish to VS Code Marketplace ──────────────────────────────────────────
  vscode-publish:
    name: Publish to VS Code Marketplace
    needs: vscode-package
    runs-on: ubuntu-latest
    environment: marketplace      # requires VSCE_PAT secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: cd hf-vscode && npm ci
      - name: Compile
        run: cd hf-vscode && npx tsc -p tsconfig.json
      - name: Publish
        run: |
          cd hf-vscode
          npx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
